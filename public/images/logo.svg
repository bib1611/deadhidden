<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" fill="none">
  <!-- Outer circle -->
  <circle cx="100" cy="100" r="95" stroke="#8b0000" stroke-width="3" fill="none"/>
  <circle cx="100" cy="100" r="88" stroke="#8b0000" stroke-width="1" fill="none" opacity="0.4"/>

  <!-- Cross -->
  <line x1="100" y1="30" x2="100" y2="170" stroke="#e8e0d0" stroke-width="4"/>
  <line x1="65" y1="70" x2="135" y2="70" stroke="#e8e0d0" stroke-width="4"/>

  <!-- Eye (all-seeing, partially closed — the hidden revealed) -->
  <ellipse cx="100" cy="120" rx="35" ry="18" stroke="#8b0000" stroke-width="2.5" fill="none"/>
  <circle cx="100" cy="120" r="8" fill="#8b0000"/>
  <circle cx="100" cy="120" r="3" fill="#e8e0d0"/>

  <!-- Rays from eye -->
  <line x1="60" y1="120" x2="50" y2="120" stroke="#8b0000" stroke-width="1.5" opacity="0.6"/>
  <line x1="140" y1="120" x2="150" y2="120" stroke="#8b0000" stroke-width="1.5" opacity="0.6"/>
  <line x1="70" y1="105" x2="62" y2="98" stroke="#8b0000" stroke-width="1.5" opacity="0.4"/>
  <line x1="130" y1="105" x2="138" y2="98" stroke="#8b0000" stroke-width="1.5" opacity="0.4"/>
  <line x1="70" y1="135" x2="62" y2="142" stroke="#8b0000" stroke-width="1.5" opacity="0.4"/>
  <line x1="130" y1="135" x2="138" y2="142" stroke="#8b0000" stroke-width="1.5" opacity="0.4"/>
</svg>
